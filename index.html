<script>
let items = [];
let ENCRYPT_KEY = "";
let editingCustomerId = null;
let salesChartInstance = null;

// UTILITY CORE ENGINE
function showToast(msg){ 
    const t = document.getElementById('toast'); 
    t.innerText = msg; 
    t.style.display = 'block'; 
    setTimeout(() => t.style.display = 'none', 3500); 
}

function toggleTheme(){ 
    const current = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark'); 
}

function encrypt(data) { 
    if (!ENCRYPT_KEY) return "";
    return CryptoJS.AES.encrypt(JSON.stringify(data), ENCRYPT_KEY).toString(); 
}

function decrypt(data) { 
    if (!ENCRYPT_KEY || !data) return null;
    try { 
        const bytes = CryptoJS.AES.decrypt(data, ENCRYPT_KEY);
        const text = bytes.toString(CryptoJS.enc.Utf8);
        return text ? JSON.parse(text) : null; 
    } catch(e) { return null; } 
}

function saveLS(key, data) { localStorage.setItem(key, encrypt(data)); }
function getLS(key) { return decrypt(localStorage.getItem(key)); }

// INTERFACE CONTROLLER BRIDGE
function switchTab(tab){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('#dashboardTab, #invoiceTab, #customersTab').forEach(d => d.style.display = 'none');
    
    if(event && event.target) event.target.classList.add('active');
    
    document.getElementById(tab+'Tab').style.display = 'block';
    if(tab === 'dashboard') loadDashboard();
    if(tab === 'customers') renderCustomers();
}

// SECURE BOOT PIPELINE
function login(){
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if(!u || !p) return showToast("Operator Credentials Required");
    
    ENCRYPT_KEY = p;
    
    const canary = localStorage.getItem('eby_auth_canary_v26');
    if(canary) {
        if(decrypt(canary) !== "AUTHORIZED") {
            ENCRYPT_KEY = "";
            return showToast("System Key Mismatch - Execution Terminated");
        }
    } else {
        saveLS('eby_auth_canary_v26', "AUTHORIZED");
    }
    
    localStorage.setItem('eby_user', u);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('systemStatus').innerText = `Active Secure Session: ${u} | Crypt Engine Operating in NGN (₦)`;
    
    loadDashboard(); 
    renderHistoryList(); 
    startAutoBackup();
}

// TRANSACTION RUNNING COMPUTATION ENGINE
function calculateRunningTotals() {
    const subtotal = items.reduce((a, b) => a + b.total, 0);
    const vat = document.getElementById('vat').checked ? subtotal * 0.075 : 0;
    const grossTotal = subtotal + vat;
    
    document.getElementById('totalDisplay').value = `₦${grossTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    
    const remitted = parseFloat(document.getElementById('amountPaid').value) || 0;
    const qrBox = document.getElementById('paymentQRBox');
    
    if(grossTotal > 0 && remitted < grossTotal) {
        qrBox.style.display = 'flex';
        const pendingValue = grossTotal - remitted;
        document.getElementById('qrPlaceholder').innerHTML = `
            <div style="width:120px; height:120px; background:#0f172a; display:flex; flex-wrap:wrap; padding:6px; border-radius:4px;">
                ${Array.from({length: 16}).map(() => `<div style="width:27px; height:27px; background:${Math.random() > 0.4 ? '#fff' : '#0a2540'}; margin:1px;"></div>`).join('')}
            </div>
            <div style="text-align:center; font-size:10px; font-weight:bold; margin-top:4px; color:#0a2540;">BAL: ₦${pendingValue.toLocaleString()}</div>
        `;
    } else {
        qrBox.style.display = 'none';
    }
}

// INVENTORY MATRIX INGESTION
function addItem(){
    const name = document.getElementById('itemName').value.trim();
    const qty = parseFloat(document.getElementById('qty').value);
    const rate = parseFloat(document.getElementById('rate').value);
    const disc = parseFloat(document.getElementById('discount').value) || 0;
    const stock = parseFloat(document.getElementById('stockQty').value) || 0;
    
    if(!name || isNaN(qty) || qty <= 0 || isNaN(rate) || rate < 0) return showToast("Invalid Entry Parameters");
    
    let stockDB = getLS('eby_stock') || {}; 
    stockDB[name] = stock; 
    saveLS('eby_stock', stockDB);
    
    items.push({ name, qty, rate, disc, total: qty * rate * (1 - disc / 100) });
    
    document.getElementById('itemName').value = '';
    document.getElementById('qty').value = '1';
    document.getElementById('rate').value = '0';
    document.getElementById('stockQty').value = '0';
    document.getElementById('discount').value = '0';
    
    renderTable();
}

function renderTable(){
    const tbody = document.querySelector('#itemsTable tbody'); 
    tbody.innerHTML = '';
    items.forEach((it, i) => { 
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${i+1}</td>
            <td><strong>${it.name}</strong></td>
            <td>${it.qty}</td>
            <td>₦${it.rate.toLocaleString()}</td>
            <td>${it.disc}%</td>
            <td><strong>₦${it.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</strong></td>
            <td style="color:#ef4444; cursor:pointer; font-weight:bold; text-align:center;" onclick="items.splice(${i},1);renderTable();">✕</td>
        `;
        tbody.appendChild(tr);
    });
    calculateRunningTotals();
}

// COMMIT INVOICE
function saveInvoice(){
    if(items.length === 0) return showToast("Transaction Manifest Empty");
    const subtotal = items.reduce((a, b) => a + b.total, 0);
    const vat = document.getElementById('vat').checked ? subtotal * 0.075 : 0;
    const total = subtotal + vat;
    const paid = parseFloat(document.getElementById('amountPaid').value) || 0;
    const dunning = document.getElementById('dunningStrategy').value;
    
    let status = "Paid";
    if (paid === 0) status = "Unpaid";
    else if (paid < total) status = "Partial";
    
    if(status !== "Paid" && dunning === "aggress") status = "AI Recovery Active";

    const inv = { 
        id: 'EGS-' + Date.now(), 
        customer: document.getElementById('billedTo').value.trim() || "Walking Retail Client", 
        items: [...items], 
        subtotal, vat, total, paid, status,
        date: new Date().toLocaleString() 
    };
    
    let history = getLS('eby_history') || []; 
    history.unshift(inv); 
    saveLS('eby_history', history);
    
    showToast("Transaction Committed Successfully to Eby-Gold Ledger"); 
    renderHistoryList(); 
    loadDashboard();
    
    items = []; 
    renderTable();
    document.getElementById('billedTo').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('address').value = '';
    document.getElementById('amountPaid').value = '0';
    document.getElementById('dunningStrategy').value = 'none';
}

function renderHistoryList(){
    const panel = document.getElementById('historyPanel'); 
    panel.innerHTML = '';
    const history = getLS('eby_history') || []; 
    const search = document.getElementById('searchHist').value.toLowerCase();
    
    history.filter(h => h.customer.toLowerCase().includes(search)).forEach(h => {
        const block = document.createElement('div');
        block.className = 'history-item';
        
        let badgeClass = "badge-paid";
        if (h.status === "Partial") badgeClass = "badge-partial";
        if (h.status === "Unpaid" || h.status === "AI Recovery Active") badgeClass = "badge-dunning";

        block.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong>${h.id}</strong>
                <span style="color:var(--primary); font-weight:700;">₦${h.total.toLocaleString()}</span>
            </div>
            <div style="font-size:12px; color:#64748b; margin-top:6px;">${h.customer}</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                <span style="font-size:11px; color:#94a3b8;">${h.date}</span>
                <span class="badge ${badgeClass}">${h.status}</span>
            </div>
        `;
        block.onclick = () => alert(`Eby-Gold Ledger Record: ${h.id}\nClient: ${h.customer}\nTotal Asset: ₦${h.total}\nRemitted Status: ₦${h.paid} (${h.status})`);
        panel.appendChild(block);
    });
}

// EXECUTIVE INSIGHT CONSOLE
function loadDashboard(){
    const history = getLS('eby_history') || []; 
    let sales = 0, vat = 0, arrears = 0; 
    
    history.forEach(inv => { 
        sales += inv.total; 
        vat += (inv.vat || 0); 
        if(inv.total > inv.paid) {
            arrears += (inv.total - inv.paid);
        }
    });
    
    document.getElementById('statSales').innerText = '₦' + sales.toLocaleString(undefined, {maximumFractionDigits: 2});
    document.getElementById('statVAT').innerText = '₦' + vat.toLocaleString(undefined, {maximumFractionDigits: 2});
    document.getElementById('statArrears').innerText = '₦' + arrears.toLocaleString(undefined, {maximumFractionDigits: 2});
    
    const stock = getLS('eby_stock') || {}; 
    document.getElementById('statStock').innerText = Object.values(stock).filter(s => s < 5).length;
    
    if(salesChartInstance) salesChartInstance.destroy();
    
    const ctx = document.getElementById('salesChart').getContext('2d');
    salesChartInstance = new Chart(ctx, { 
        type: 'line', 
        data: { 
            labels: history.slice(0, 7).reverse().map(h => h.id.split('-')[1].substring(8)), 
            datasets: [
                { label: 'Gross Pipeline', data: history.slice(0, 7).reverse().map(h => h.total), borderColor: '#d4af37', backgroundColor: 'rgba(212,175,55,0.1)', fill: true, tension: 0.4 },
                { label: 'Remitted Cash', data: history.slice(0, 7).reverse().map(h => h.paid), borderColor: '#10b981', fill: false, tension: 0.2 }
            ] 
        }, 
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#64748b' } } } } 
    });
}

// REGISTER REGISTRY FLOWS
function saveCustomer(){
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    const address = document.getElementById('custAddress').value.trim();
    if(!name) return showToast("Customer Entity Label Required");

    let customers = getLS('eby_clients') || [];
    if(editingCustomerId !== null){
        customers[editingCustomerId] = { name, phone, address, id: customers[editingCustomerId].id };
        editingCustomerId = null;
    } else {
        customers.push({ name, phone, address, id: Date.now() });
    }
    saveLS('eby_clients', customers);
    
    document.getElementById('custName').value = '';
    document.getElementById('custPhone').value = '';
    document.getElementById('custAddress').value = '';
    renderCustomers(); 
    showToast("Registry Verified Base State Altered");
}

function renderCustomers(){
    const customers = getLS('eby_clients') || [];
    const search = document.getElementById('searchCustomer').value.toLowerCase();
    const list = document.getElementById('customersList'); list.innerHTML = '';
    
    customers.filter(c => c.name.toLowerCase().includes(search)).forEach((c, idx) => {
        const item = document.createElement('div');
        item.className = 'customer-item';
        item.style = "padding:16px; border:1px solid var(--border); border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; background:var(--card);";
        item.innerHTML = `
            <div style="flex:1;"><strong>${c.name}</strong><br><small style="color:#64748b;">${c.phone || 'N/A'} | ${c.address || 'N/A'}</small></div>
            <div>
                <button class="btn btn-sm btn-gold" onclick="editCustomer(${idx})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${idx})">Drop</button>
            </div>
        `;
        list.appendChild(item);
    });
}

function editCustomer(idx){
    const customers = getLS('eby_clients') || [];
    document.getElementById('custName').value = customers[idx].name;
    document.getElementById('custPhone').value = customers[idx].phone;
    document.getElementById('custAddress').value = customers[idx].address;
    editingCustomerId = idx; switchTab('customers');
}

function deleteCustomer(idx){
    if(!confirm("Drop client parameters out of persistent ledger memory?")) return;
    let customers = getLS('eby_clients') || []; customers.splice(idx, 1); saveLS('eby_clients', customers); renderCustomers();
}

function searchCustomer(val){
    const div = document.getElementById('customerSuggestions'); div.innerHTML = '';
    if(!val.trim()) return;
    const customers = getLS('eby_clients') || [];
    customers.filter(c => c.name.toLowerCase().includes(val.toLowerCase())).slice(0, 4).forEach(c => {
        const row = document.createElement('div');
        row.className = 'suggestion-item'; row.innerText = c.name;
        row.onclick = () => {
            document.getElementById('billedTo').value = c.name;
            document.getElementById('phone').value = c.phone || '';
            document.getElementById('address').value = c.address || '';
            div.innerHTML = '';
        };
        div.appendChild(row);
    });
}

// BACKUP MANAGEMENT CORE
function exportDB(){
    const data = { clients: localStorage.getItem('eby_clients'), history: localStorage.getItem('eby_history'), stock: localStorage.getItem('eby_stock') };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `EbyGold_Vault_Backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
    showToast("Vault System Backup Process Finalized");
}

function importDB(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
        try {
            const data = JSON.parse(evt.target.result);
            if(data.clients) localStorage.setItem('eby_clients', data.clients);
            if(data.history) localStorage.setItem('eby_history', data.history);
            if(data.stock) localStorage.setItem('eby_stock', data.stock);
            showToast("System State Restoration Finalized."); setTimeout(() => location.reload(), 1200);
        } catch(err) { showToast("Malformed Backup Parsing Logic Match."); }
    };
    reader.readAsText(file);
}

function startAutoBackup(){
    setInterval(() => { exportDB(); }, 86400000);
}

// HIGH-FIDELITY AUTOMATED PDF MANIFEST ENGINE
function downloadPDF(){
    const { jsPDF } = window.jspdf;
    if(items.length === 0) return showToast("Cannot render empty PDF document matrix");
    
    const doc = new jsPDF({ format: 'a4' });
    const client = document.getElementById('billedTo').value || "Walking Retail Client";
    const subtotal = items.reduce((a, b) => a + b.total, 0);
    const vat = document.getElementById('vat').checked ? subtotal * 0.075 : 0;
    
    doc.setFont("Helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(10, 37, 64);
    doc.text("EBY-GOLD SUPERSTORES", 14, 24);
    
    doc.setFontSize(9); doc.setFont("Helvetica", "normal"); doc.setTextColor(100, 116, 139);
    doc.text("PREMIUM COMMERCIAL TRANSACTION RECORD MATRIX", 14, 30);
    
    doc.setFontSize(10); doc.setTextColor(15, 23, 42);
    doc.text(`Client Entity: ${client}`, 14, 44);
    doc.text(`Contact Registry: ${document.getElementById('phone').value || 'N/A'}`, 14, 50);
    doc.text(`Date Signature: ${new Date().toLocaleString()}`, 130, 44);
    
    let rows = items.map((it, idx) => [idx + 1, it.name, it.qty, `NGN ${it.rate.toLocaleString()}`, `${it.disc}%`, `NGN ${it.total.toLocaleString()}`]);
    doc.autoTable({
        startY: 58,
        head: [['S/N', 'Item Manifest Descriptor', 'Qty', 'Unit Rate', 'Markdown', 'Net Asset Total']],
        body: rows,
        headStyles: { fillColor: [10, 37, 64] },
        styles: { font: "Helvetica", fontSize: 9 }
    });
    
    let finalY = doc.lastAutoTable.finalY + 14;
    doc.setFontSize(10);
    doc.text(`Gross Subtotal Matrix: NGN ${subtotal.toLocaleString()}`, 120, finalY);
    doc.text(`Statutory Tax (7.5% VAT): NGN ${vat.toLocaleString()}`, 120, finalY + 6);
    doc.setFontSize(12); doc.setFont("Helvetica", "bold");
    doc.text(`Total Payable Value: NGN ${(subtotal + vat).toLocaleString()}`, 120, finalY + 14);
    
    doc.setFontSize(8); doc.setTextColor(148, 163, 184);
    doc.text("SYSTEM POWERED AND SECURED BY EBY-GOLD OPERATIONS CONSOLE", 14, finalY + 30);
    
    doc.save(`EbyGold_Manifest_${Date.now()}.pdf`);
}

function printInvoice(){ window.print(); }
function logout(){ localStorage.clear(); location.reload(); }

// FIXED LIFECYCLE INITIALIZER: Always forces login display to handle first-time users
window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
    if(localStorage.getItem('eby_user')){
        showToast("System Secured. Input Encryption Password to Initialize Vault.");
    }
});
  </script>
